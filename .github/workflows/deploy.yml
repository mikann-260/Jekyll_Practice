name: "deploy workflows"

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build:
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
      - name: "Setup Ruby"
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
      - name: "Build Jekyll"
        run: "bundle exec jekyll build"

      - name: "Setup Node"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: "Install Minifier"
        run: "npm ci"
      - name: "Minify"
        run: "npm run minifyBash"

      - name: "Deploy"
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          ublish_branch: gh-pages
