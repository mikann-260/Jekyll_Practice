<!doctype html>
<html lang="ja">
  <head>
    {% include head.html %}
  </head>
  <body>
    <div class="frame">
      <main>
        <h1 class="title">{{ page.title }}</h1>
        <p>{{ page.description }}</p>
        <noscript>
          <div>
            <p class="h2">【JavaScriptが無効になっています】</p>
            <p>このページはJavaScriptを使用しています。</p>
            <p>ブラウザーの設定で、JavaScriptを有効化してください。</p>
          </div>
        </noscript>
        <div class="main" id="yesscript" style="display: none">
          {{ content }}
        </div>
      </main>
    </div>
  </body>
</html>
