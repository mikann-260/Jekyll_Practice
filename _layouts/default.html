<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="{{ page.description }}" />
    <meta name="theme-color" content="#028760" />
    <meta name="robots" content="noindex, follow" />
    <title>{{ page.title}}</title>
    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      href="{{ site.baseurl }}/assets/images/favicon/favicon-96x96.png"
      sizes="96x96" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="{{ site.baseurl }}/assets/images/favicon/favicon.svg" />
    <link
      rel="shortcut icon"
      href="{{ site.baseurl }}/assets/images/favicon/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="{{ site.baseurl }}/assets/images/favicon/apple-touch-icon.png" />
    <!-- <meta name="apple-mobile-web-app-title" content="mikann" />
    <link rel="manifest" href="{{ site.baseurl }}/assets/images/favicon/site.webmanifest" /> -->
    <!-- Font -->
    <link
      rel="preload"
      href="https://cdn.jsdelivr.net/npm/yakuhanjp@4.1.1/dist/css/yakuhanjp.css"
      as="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/yakuhanjp@4.1.1/dist/css/yakuhanjp.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+JP:wght@100..900&display=swap"
      rel="stylesheet" />
    <!-- CSS -->
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/base.css" />
    <link rel="stylesheet" href="style.css" />
    <!-- JavaScript -->
    <script src="{{ site.baseurl }}/assets/js/script.js" defer></script>
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="frame">
      <main>
        <h1 class="title">{{ page.title }}</h1>
        <noscript>
          <div>
            <p class="h2">【JavaScriptが無効になっています】</p>
            <p>このページはJavaScriptを使用しています。</p>
            <p>ブラウザーの設定で、JavaScriptを有効化してください。</p>
          </div>
        </noscript>
        <div class="main" id="yesscript" style="display: none">
          {{ content }}
        </div>
      </main>
    </div>
  </body>
</html>
