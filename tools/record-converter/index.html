---
layout: tool
title: 記録変換
description: 入力された距離と記録から、別の距離に換算した予想タイムや時速などを計算します。
---

<div class="input">
  <p class="h3">記録</p>
  <div class="length">
    <label>
      <input min="0" step="1" type="number" id="beforeLen" />
      m
    </label>
  </div>
  <div class="time">
    <label>
      <input min="0" step="1" type="number" id="minutes" />
      分
    </label>
    <label>
      <input min="0" max="59" type="number" id="seconds" />
      秒
    </label>
  </div>
  <p class="h3">変換後の距離</p>
  <label>
    <input min="0" step="1" type="number" id="afterLen" />
    m
  </label>
</div>
<div class="output">
  <p class="h3">変換した記録</p>
  <p id="output">変換後のタイム:</p>
  <p id="hm">時速:</p>
  <p id="mm">分速:</p>
  <p id="sm">秒速:</p>
</div>
